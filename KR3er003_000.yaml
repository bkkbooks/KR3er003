body:
  text: 五藏六府諸病第一篇肝藏說每日丑時周身血氣俱注於肝謙按肝干也謂其性好動而干犯他藏也故曰肝為剛藏其形上面隆凸下面凹陷分左右兩大扇貼於橫膈膜下色紫赤中有血液釀出膽汁以為消化水穀之用其性喜條達而惡抑鬱故經曰木鬱達之肝病沈金鰲曰肝於五藏為將軍之官合少陽膽為一部居脾之右腎之前其位近少腹其地當血海其部在兩脅其經起足指上通顛頂其氣本陰因其表為少陽故一陽發生之氣起於厥陰而一身上下無所不至肝和則氣發揚為諸藏之贊助若衰與亢則反為諸藏之殘賊其職主藏血又主筋能任筋骨勞役之事其精上注於目兼通於耳其德屬木故體本柔而剛直而升以應春氣及其為病也多逆逆則頭脅或少腹痛耳聾目瞑口苦善怒喜瘛虛則善恐聾瞶經病則腰痛疝㿉少腹腫甚則嗌乾色脫遺溺癃閉其氣鬱或勝必侵及乎脾土土受木克則胸滿嘔逆也夫肝氣之逆由肝鬱所致然治郁不可用攻伐故經曰以辛散之以辛補之若肝火實證又每因肝血之虛既虛則不得不滋養故經曰以酸收之以甘緩之總之肝氣鬱宜辛溫肝血虛宜清潤薛氏清火補肝兩說夫豈不通之論哉素四氣調神大論春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭披髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝十六難假令得肝脈其外證善潔面青善怒其內證臍左旁有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也肝風素風論肝風之狀多汗惡風善悲色微蒼嗌乾善怒診在目下其色青肝氣靈邪淫發夢篇肝氣盛則夢怒肝熱素熱論肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥痿論肝熱者色蒼而爪枯肝中寒金匱肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也肝咳素咳論肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿肝脹靈脹論肝脹者脅下滿而痛引少腹肝痹素五藏生成篇青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛肝著金匱肝著其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之肝瘧素刺瘧篇肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血膽府說每日子時周身血氣注於膽謙按膽在肝之短葉間位居右側形如囊內貯膽汁由肝藏分泌而出其色緑有黏性氣臭味苦能助食物消化西人測驗另有一管通脾其信然歟膽病沈金鰲曰膽為中正之官又為中清之府其府直得先天甲木之氣乃一陽之妙用也經曰少陽連腎腎上連肺夫少陽起於夜半之子為腎之天根其氣上升以受肺之節治通乎上下遊行三焦故十一經皆取決於膽經曰少火生氣以少陽即嫩陽為生氣之首也若夫動而為病實則口苦耳聾鼻淵脅痛馬刀挾癭虛則易驚潮熱或不得眠有實則易怒虛則善恐又膽病多寒熱也古人以小柴胡為少陽正藥而溫膽湯瀉青丸亦各有寒熱之所宜臨證細酌焉可也靈邪氣藏府病形篇膽病者善太息口苦嘔宿汁心下淡淡恐人將捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉四時氣篇善嘔口苦邪在膽逆在胃膽汁泄則口苦胃氣逆則嘔苦經脈篇膽足少陽之脈是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用膽脹靈脹論膽脹者脅下痛脹口中苦善太息膽疸素奇病論口苦者病名曰膽疸夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞心藏說每日午時周身氣血俱注於心謙按心居胸部中央能生血亦能行血有大小各脈管穿貫其間其質系筋肉結合而成其外又有層層滑澤之油膜包裹之或曰心囊或曰即心包絡中有孔竅分左右上下四房其功用在收放往來之血液榮養百骸如血虛或不流暢皆足生病也心病沈金鰲曰心位南方配夏令故稱君火心精滿始能分神於四藏心氣充始能引精於六府所謂生之本神之居血之主脈之宗也但心與腎連若腎水不足則心火必至上炎大凡火之有餘皆由血之不足若心火之有餘不足詎得與六淫之火同論哉亦惟握精固氣養陰凝神調劑使抵於平和而已嘗考內經所言心病共分三項其一謂心之虛實皆不見於本藏而見於經絡如胸腹腰脅兩臂痛是也其一言始病經絡次及於心藏者如心經絡病嗌乾心痛是也其一則言思慮往來神不守舍如精氣並於心則驚喜奪精汗出於心及憂思傷心是也凡諸心病者皆由不能養精以馭氣而使神以氣存氣以精宅也欲求心無病者可不於此加之以意哉素標本病傳篇心病先心痛一日而咳三日脅支痛五日閉塞不通身痛體重三日不已死冬夜半夏日中藏氣法時論心病者胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛虛則胸腹大脅下與腰相引而痛靈邪客篇諸邪之在心者皆在於心之包絡包絡者心主之脈也本神篇心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬十六難心脈其外證面赤口乾喜笑其內證臍上有動氣按之牢若痛其病煩心心痛掌中熱而晼心氣靈淫邪發夢篇心氣盛則夢善笑恐畏心虛素藏氣法時論心虛則胸腹大脅下與腰相引而痛靈本神篇心氣虛則悲金匱心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲陽氣衰者為狂心傷金匱心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心藏傷所致也心熱素痿論心熱者色赤而絡脈溢刺熱論心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸水甚丙丁火大汗氣逆則壬癸死刺手少陰太陽心痛靈經脈篇心手少陰之脈動則病嗌乾心痛渴而欲飲五邪篇邪在心則病心痛善悲時眩僕心疝素脈要精微論診得心脈而急病為心疝少腹當有形也大奇論心脈搏滑急為心疝靈邪氣藏府病形篇心脈微滑為心疝引臍小腹鳴心脹靈脹論心脹者煩心短氣臥不安心風素風論以夏丙丁傷於風者為心風心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤心中風金匱心中風者翕翕發熱不能起心中飢食即嘔吐心中寒金匱心中寒者其人苦病心如啖蒜狀劇者心痛徹背背痛徹心譬如蟲注其脈浮者自吐乃愈心瘧素刺瘧篇心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰小腸府說每日未時氣血至小腸謙按小腸較大腸細而長上接於胃下口之幽門下連大腸居腹之中部凡胃中所納食物皆輸入小腸由小腸下口之闌門分別滓穢入大腸其水則滲入膀胱故曰受盛之府小腸病沈金鰲曰小腸之職與大腸相似皆為胃化物之器故其病亦與胃同因本經與心絡並行隧道故本經病或延及於心然只在經絡而已其為病也實則嗌痛頷腫節弛肘廢小水不利色赤或澀痛或尿血虛則遺尿面白小腸生贅疣則發為遺溺閉癃等病靈邪氣藏府病形篇小腸病者小腹痛腰脊控睪而痛當耳前熱若寒甚若獨肩上熱甚及手小指次指間熱若脈陷者此其候也手太陽病也取之巨虛下廉小腸氣素至真大要論太陽在泉寒淫所勝民病小腹控睪引腰脊上衝心靈脹論小腸脹者少腹䐜脹引腰而痛小腸泄五十七難小腸泄者溲而便濃血少腹痛小腸咳素咳論心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失小腸癰靈樞關元隱隱痛者小腸疽其上肉微起者小腸癰脾藏說每日巳時氣血注脾謙按脾者卑也謂如土之卑下也居胃底之外側又脾者裨也謂其攻用裨助胃氣以消化穀食也形圓長而扁氣旺則血流走氣虛弱則運化之機滯而病生矣脾病沈金鰲曰脾者後天之本四藏皆賴其煦育也其職主為胃行精液掌太倉之運量而以升為德其部當水穀之海故惡濕在五行屬土配資生之坤元故為十二經根本居中央以灌四旁故健運乃能無病經曰腹滿䐜脹下厥上冒者皆由中氣不運脾陰鬱結而陽明之氣亦不上騰是以不能出營衛升達上下也惟不上升故肺氣不行而上冒惟不下達故腎氣獨沉而下厥耳至若本經為病不外濕淫熱鬱兩端濕由水氣病則壅壅傷氣必腹脹胃痛腸鳴飧泄身重食不消化熱由火氣病則不濡不濡則傷血血枯而燥必胃氣厚善飢肉痿善瘛腳下痛口乾舌本強食即吐或食不下煩心脾約此皆脾陰病也治之者務使三焦流轉土潤而升則火氣不得病之土溫而旺則水氣亦不得病之矣素標本病傳論脾病身痛體重一日而脹二日少腹腰脊痛脛痠三日背膂筋痛小便閉十日不已死藏氣法時篇脾病者身重善肌肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化靈本神篇脾愁憂而不解則傷意意傷則挽亂四肢不舉毛悴色夭死於春十六難假令得脾脈其外證面黃善噫善思善味其內證當臍有動氣按之牢若痛腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也脾風素風論脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃玉機真藏論肝傳之脾病名曰脾風發疸腹中熱煩心脾疸素奇病論有病口甘者此五氣之溢也名曰脾疸夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也脾中風金匱脾中風者翁翁發熱形如醉人腹中煩重皮目瞤瞤而短氣脾水金匱水氣病篇脾水者其腹大四肢苦重津液不生但苦少氣小便難脾脹靈脹論脾脹者善噦四肢煩悗體重不能勝衣臥不安脾虛泄素藏氣法時論脾虛則腹滿腸鳴飧泄食不化五十七難脾泄者腹脹滿泄注食即嘔吐逆脾約液枯便閉也金匱五藏風寒趺陽脈胃脈浮而澀浮則胃氣強澀則小便數浮澀相博大便則堅其脾為約麻仁丸主之脾咳素咳論脾咳之狀咳則右脅下痛隱隱引肩背甚則不可以動動則咳劇脾瘧素刺瘧篇脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰脾熱素刺熱論脾熱病者鼻先赤節脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛甲乙木甚戊己土大汗氣逆則甲乙死刺足太陰陽明痿論脾熱者色黃而肉蠕動胃府說每日辰時氣血注於胃府謙按胃者匯也水穀匯聚之所也為人體內之消化器位居中央色黃屬土其形如囊左大右小橫臥於膈膜之下胃囊上端一管為食道直接喉下稍下曰賁門胃囊之下端為幽門連於小腸之上口胃體系筋肉結合而成內有黏膜其紋皺胃氣盛者能食而不傷過時而不飢胃氣衰者則反是胃病沈金鰲曰經曰陽明者午也午為夏之中相火之本職又三陽之合氣故於十二經氣獨盛血獨旺熱極多而心胞絡之代心以主相火者皆與胃同其功用也故就胃言之實營衛之大主五藏之宗主其氣騰而上盛則脈倍見於人迎其精充而下輸則脈湧盛於趺陽仲景治病必三部候脈兩手之外必兼診兩頰喉之人迎兩足趺之衝陽良有以也蓋以腎為先天之根胃為後天之本胃強則後天強而先天亦得補助胃絶則後天絶雖先天足恃七日不食亦死故胃雖屬府其脈能大見於寸口而五藏亦待以養也夫胃府既氣盛血旺熱多故其為病亦多實熱有餘之症試觀狂瘧溫淫汗出鼽衄口喎唇疹腮腫喉痹斑黃狂亂譫語潮熱登高而呼棄衣而走詈罵不避親疏等實症非以其府為兩陽合明之故乎仲景曰陽明之為病胃家實也固指氣盛血旺熱多而言非僅指燥滿便硬也雖然胃家病固多有餘而亦時形不足比如相火既虛不能熏蒸胃土胃氣即不旺氣不旺即怯而不支故亦有虛寒之症試觀灑灑振寒善伸數缺顏黑惡人與火聞水聲惕然而驚心欲動獨閉戶牖而處身以前皆寒栗胃中寒䐜脹陽明之虛寒亦有如此者安得泥胃家實之一言概從有餘治之哉素標本病傳論胃病脹滿五日少腹腰脊痛胻痠三日背膂筋痛小便閉五日身體重六日不已死靈邪氣藏府病形篇面熱者足陽明病師傳篇胃中熱則消穀令人懸心善飢臍上皮熱胃中寒則腹脹胃脘病素評熱病論食不下者胃脘膈也靈大惑篇胃氣逆上則胃脘寒胃風素風論胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大腸胃寒熱靈師傳篇胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹胃脹靈脹論胃脹者腹滿胃脘痛鼻間焦臭妨於食大便難胃咳素咳論脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出胃泄五十七難胃泄者飲食不化色黃胃反金匱嘔吐噦篇病人脈數數則為熱當消穀引食而反吐者何也師曰以發其汗令陽氣微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為反胃寒在於上醫反下之令脈反弦故名曰虛又趺陽脈浮而澀浮則為虛澀則脾傷脾傷則不磨朝食暮吐宿穀不化名曰胃反脈緊而澀其病難治又嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之又諸嘔吐谷不得下者小半夏湯主之又胃反嘔吐者大半夏湯主之又胃反吐而渴欲飲水者茯苓澤瀉湯主之胃癰素病能論此診者當候胃脈其脈當沉細沉細者色逆也逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也肺藏說每日寅時周身氣血俱會萃而注於肺謙按肺者市也百脈朝會之所也其質脆而澤中有氣管及多數微絲血管左右兩扇色紅淡微灰居人身內最高之地為諸藏之華蓋其功用內司呼吸及輸運津液外主皮毛使百脈流通肺病沈金鰲曰肺主氣上連喉系下通心肝之竅司呼吸出入居上以鎮諸藏而壓糟粕以行於大腸出納清氣以化濁物所居者太陽之陰太陽以心胸為里能固陽氣肺主皮毛而衛外所司者太陰之陽以行陰物又與足太陰脾同行氣以給衆藏故亦名太陰其屬則位西方金其配則為秋令秋則氣化清肅萬物賴以成就金則為水之母其氣恆下行靜時下澄於腎宮與水相通經所謂母隱子胎是也但腎為真水天一所生肺既為其母故居華蓋之頂猶據天河之上源以注崑崙而入龍門匯於海也其輸精於藏府猶在天之雨露澤潤萬物也然常病燥與寒熱者以輸精四布或太過則不能滋化或邪乘則不得行令故反病燥反病寒熱也古人嬌藏之名所由來矣夫肺主皮毛而皮毛則純屬太陽之部太陽之傷風傷寒汗出中風與形寒飲冷皆能傷肺故其現症如鼻塞聲重喘咳氣逆肩背痛嚏噴胸滿煩心亦與太陽同五志之火上炎陰虛內爍肝火挾心而刑金亦能傷肺故其現症如肺痿肺癰痿躄吐血聲嘶息有音鼽衄掌熱喘不休口血出皮毛焦皆由火燥焦灼之故若虛則有少氣不能報息耳聾嗌乾諸症凡茲病症若由外傷者其治法與足太陽同或邪盛鬱塞必於足太陽瀉之若傷於內者正氣衰金被殘賊必於足少陰養之使子能助母而金氣不至耗泄又必於足太陰培之使母能生子而金氣得以涵育抑猶有進者金性下沉隱於子胎腎家水火兩病肺俱能受其害故有時腎水上泛為痰肺受之則喘壅而嗽有時腎火上炎肺受之則喘息而鳴皆腎氣上逆而為病也調理大法除本經自病外要不過於足太陽太陰少陰三經分治之素標本病傳論肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死藏氣法時論肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾靈本神篇肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏難經外症面白善嚏悲愁欲哭內症右有動氣按之牢若痛其病喘咳灑淅而寒熱也肺氣靈淫邪發夢篇肺氣盛則夢恐懼哭泣飛揚素痿論所求不得則病肺鳴肺風素風論以秋庚辛中於邪者為肺風肺風之狀無汗惡風色白時咳短氣晝日則瘥暮則甚診在眉上其色白肺傷脈經肺傷者其脈細緊浮數其人勞倦咳唾血肺痿金匱一熱在上焦者因咳為肺痿肺痿之病或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之二寸口脈數其人咳口中反有濁唾涎沫者為肺痿之病三脈數虛者為肺痿四肺痿吐涎沫而不咳者其人不便必遺尿所以然者以上虛不能制下故也此名肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴肺癰素大奇論肺之壅一作癰喘而兩胠滿金匱一口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血二脈數實者為肺癰三寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴時唾濁沫時時振寒熱之則過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死肺中風寒金匱一肺中風者口燥而喘身重冒而腫脹二肺中寒吐濁涕肺水金匱水氣篇肺水者身重小便難時時鴨溏肺咳素咳論皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則內外合邪因而客之則為肺咳肺咳之狀咳而喘息有音甚則唾血肺脹靈脹論肺脹者虛滿而喘咳金匱一咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之二上氣喘而躁者屬肺脹欲作風水發汗則愈三肺脹咳而上氣煩燥而喘脈浮者心下有水小青龍加石膏主之四上氣面浮腫肩息其脈浮大不治又加利尤甚肺飲金匱痰飲篇肺飲不弦但苦喘短氣肺消即上消也素氣厥篇心移熱於肺傳為鬲消心移寒於肺則肺消肺能通調水道者賴心火以溫之心火不足不溫肺而反移以寒則肺氣衰矣肺消者飲一溲二死不治肺瘧素刺瘧篇肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明肺熱素刺熱篇肺熱病者頰先赤節肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如豆大立已痿論肺熱者色白而毛敗大腸府說每日卯時氣血注大腸謙按大腸上接小腸下連肛門內分回腸廣腸直腸三部其管較闊於小腸為傳送糟粕之府其傳送糞滓出魄門實賴肺金下降之氣以行之故大腸上與肺藏相應大腸病沈氏曰大腸為胃府傳化物之器故經曰大腸者傳道之官化物出焉其經與足陽明相接故亦名手陽明又以其為營氣之隧道與肺相接故經絡得與肺相表裡經又曰脾胃大小腸三焦膀胱者倉廩之官營之居也名曰器能化糟粕轉味而以為出入者也是皆至陰之類通乎土氣則經固指大腸等為陰矣以其為陽者蓋以藏府之內外言之以為至陰之類者則就其職任言之讀者不以詞害意可也要之大腸所由之隧道雖與肺相屬而為表裡而大腸之絡實與陽明胃接故其病多與胃同與肺無涉即間有經絡自病延及於肺亦只在經絡不如傷寒之傳經必及於藏府也靈邪氣藏府病形篇大腸病者腸中切痛而鳴濯濯冬日重感於寒則泄當臍痛不能久立與胃同候取巨虛上廉師傳篇腸中熱則出黃如糜臍以下皮寒腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹大腸泄五十七難大腸泄者食已窘迫大便色白腸鳴切痛大腸痹素痹論腸痹者數飲而出不得中氣喘爭時發飧泄大腸咳素咳論肺咳不已則大腸受之大腸咳狀咳而遺失大腸癰疽靈癰疽篇天樞隱隱痛者大腸疽其上肉微起者大腸癰腎藏說每日酉時周身氣血注於腎謙按腎有兩枚在腹腔之背脊兩旁左右對列形如蠶豆而大外旁凸出內旁凹入秉寒水之氣而命火即寄其中受藏五藏六府之精以化髓生骨又能分析血中之廢料下注膀胱以成尿液腎藏作用分精氣兩項精者腎中之真陰男為精室女系胞宮均有脂膜與腎系相連陰靜則精聚而不散火動則精泄而腎虛矣腎氣者即腎中之真元上吸天陽下入丹田之氣也丹田內通腎系真陽由腎系入命門為全身諸氣之根人生性命之本繼而下達膀胱復蒸發上行為衛氣溫分肉充皮膚肥腠理司開合其行而會於中焦則宣穀氣熏肌膚充周身澤毛髮勢若霧露之溉至上為宗氣則積於胸中出於喉嚨貫心肺而行呼吸故丹田又名氣海氣之所以流行不息者即命門中相火之功用也腎病沈氏曰少陰者陽氣初轉陰氣乍生之謂太陽寒水司氣獨歸於腎腎與膀胱相表裡故腎為陽初轉陰乍生之藏蓋以腎之氣主蟄伏主歸藏屬於冬令天地斂閉之氣必歸於此是以腎得主寒水也人身有水必有火是以腎為先天根本與心火相對待也腎與心火南北對待而命門真火亦寄於中者何蓋即坎中一畫乾陽以運化生長收藏也是腎固以寒為位以水為用以火為本其質堅滑者水之體其氣流行者火之化也所以諸藏各一獨腎有水火兩具而命門真火與蟄藏真水兩相融洽坎中一陽即藏於兩陰之間故命火亦即涵於真水之內如天地之陰陽動靜互相樞紐然靜極而動陽生陰中遂能升陰精以上奉心主此升坎填離水火既濟先天神妙之不可思義者也先輩云腎藏之水如海火如龍水暖則龍潛水寒則龍起是腎火炎熾為患皆由腎水虛寒而腎既虛寒益為脾土所克其病生矣此言水火不能既濟而為病也然不但此也腎家有水火兩病火病者龍火上爍為害有亢與衰之分水病者寒淫所勝為災有水涸濕盛之別又剋水者為土然水藏土中土衰則水泛內經謂腎合精其主脾不曰克而反曰主者意在斯也又先哲之言曰腎水不足勿撲其火須滋陰之真源以配火腎火不足勿傷其水須益其火之源以配水果能三復斯言治腎病之能事畢矣素標本病傳論腎病少腹腰脊痛胻痠三日背膂筋痛小便閉三日腹脹三日兩脅支痛三日不已死藏氣法時論腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂靈本神篇腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏十六難假令得腎脈其外證面黑善恐缺其內證臍下有動氣按之牢若痛其病逆氣小腹急痛泄如下重足脛寒而逆有是者腎也腎水金匱水氣篇腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面黃瘦大便反堅腎氣靈淫邪發夢篇腎氣盛則夢腰脊兩解不屬腎風素風論以冬壬癸中於邪者為腎風腎風之狀多汗惡風面龐然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑奇病論有病龐然如有水狀切其脈大緊身無痛者形不瘦不能食食少病生在腎名為腎風腎風而不能食善驚驚已心氣痿者死評熱病論有病腎風者面胕龐然壅害於言虛不當刺腎熱素刺熱論腎熱病者頤先赤節腎熱病者先腰痛胻痠苦渴數飲身熱熱爭則項痛而強胻寒且酸足下熱不欲言其逆則項痛員員淡淡然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽痿論腎熱者色黑而齒槁腎脹靈脹論腎脹者腹滿引背央央然腰髀痛腎虛素藏氣法時論腎虛則胸中痛大腹小腹痛清厥意不樂腎瘧素刺瘧篇腎瘧者令人灑灑然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰腎咳素咳論腎咳之狀咳則腰背相引而痛甚則咳涎膀胱府說每日申時血氣注於膀胱謙按膀旁也言其橫於腹腔下部之旁以通水道也胱者言其質薄而明也俗稱尿胞其底旁左右本有輸尿管各一內通腎藏其前面下端又有排尿口與尿道相接腎藏分泌之尿由輸尿管入膀胱貯蓄之既滿則開放從尿道泄出矣膀胱病沈氏曰膀胱居下邑以藏津液必待氣化而後能出又其經同沖氣起於少陰則其為器似有不可與諸陽並列者乃反名太陽者何蓋以其為腎之府且其經起足上巔行於表居六經之首為三陽之主獨號巨陽故曰太陽也後人之昧昧者見人稱膀胱為太陽寒水遂疑其專主寒令不知六氣之寒水惟腎能主之而膀胱不能獨主膀胱不能主寒水則膀胱之水亦屬陽水其寒邪能傷之者實以陽氣不足而陰寒之氣得以乘之耳總之實則為熱虛則為寒實則為熱如胞移熱於膀胱而為遺溺癃閉尿血等症是也虛則為寒如小便不禁膀胱冷氣是也素標本病傳論膀胱病小便閉五日少腹脹腰脊痛䯒痠一日腹脹一日身體痛二日不已死氣厥論胞移熱於膀胱則癃溺血膀胱脹靈脹論膀胱脹者少腹滿而氣癃膀胱咳素咳論腎咳不已則膀胱受之膀胱咳狀咳而遺溺三焦府說每日亥時周身血氣注於三焦經謙按三焦為中清之府調和內外榮養左右導宣上下其根在兩腎之間有油膜一條貫脊命曰命門是為焦原從此係發生板油其狀若網連胸膈上循心胞並肺系達咽其外出者為手臂胸前之腠理是為上焦從板油連及小腸旁之雞冠油又外出為腰腹之腠理是謂中焦從板油後連大腸之網油前通膀胱中接胞室復外出為臀脛少腹之腠理是謂下焦三焦於周身之藏府經絡均有關係也補說靈榮衛生會篇上焦出胃上口並咽貫膈而布胸中走府循太陰之分而行還至陽明上舌下足陽明常與榮俱行於陽二十五度行陰亦二十五度一周也故五十度而復大會於手太陰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸精液化其精微上注肺脈乃化為血以養生身莫貴於此命曰榮氣下焦者別回腸注於膀胱而滲入焉水穀並居胃中成糟粕俱下大腸而成下焦滲而俱下濟泌別汁循下焦而入膀胱焉三十一難三焦者水穀之道路氣之所終始也上焦在心下下鬲在胃上口主內而不出其治在膻中中焦者在胃中脘不上不下主腐熟水穀其治在臍旁下焦者當膀胱上口主分別清濁主出而不納以傳導也其治在臍下故曰三焦其府在氣街按氣街者氣之道路也頭氣以腦為街胸氣以膺與背腧為街腹氣以背腧衝脈臍旁左右動者為街脛氣以承山踝上為街茲所言三焦之府在氣街者腹氣之街也三焦病沈氏曰古人云上焦如霧者狀其化物升騰之氣也中焦如漚又云如瀝者狀化時沃溢之氣也下焦如瀆者狀擠泌流水之象也誠以三焦所施之氣得相火之功為腐熟水穀之用故曰焦也三焦所主部位上焦自胃上口承接心肺下焦在胃下口輸水穀於小腸水液滲入膀胱以注前陰滓穢轉大腸以注後陰若膈之下臍之上中間脾胃一段則中焦所主之部也王海藏謂上焦霧不散則喘滿為出而不納中焦漚不利則留飲久必中滿為上不能納下不能出下焦瀆不利則腫滿為上納而下不出之症蓋謂三焦氣滯急當使之流通與內經所謂三焦為水穀道路其病宜通利二便者將毋同也因並記之靈邪氣藏府病形篇三焦病者腹氣滿小腹尤堅不得小便窘急溢則水句留即為脹應在足太陽之外大絡節腸中不便三焦脹靈脹論三焦脹者氣滿於皮膚中輕輕然而不堅三焦咳素咳論久咳不已則三焦受之三焦咳狀咳而腹滿不欲飲食三焦熱金匱風寒積聚篇熱在上焦者因咳而為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋閉不通三焦竭金匱同上問曰三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消穀故能噫也下焦竭即遺溺失便其氣不和不能自禁制不須治久則愈心胞絡說亦屬藏每日戊時周身氣血注於心胞絡謙按素問靈蘭祕典論十二官無心胞絡之名但有膻中之名蓋即心胞絡也心包絡在心外橫膜之上豎膜之下其與橫膜相黏而黃脂包裹者心也脂膜之外有細筋膜如絲與心肺相連者心胞絡也其絡上通腦頂外布一身主血液之往還即今所謂回血發血諸管也此藏為手太陰之一心藏之有胞絡猶蓮花之有橐蘥橐蘥虛空則蓮子動搖包絡充足則心君安逸包絡不充則有怔仲驚悸心嘈心痛等症其餘參看心病各條又按女子胞宮之絡脈亦稱包絡即衝脈也素問奇病論云包絡者繫於腎痿論云悲哀太甚則包絡絶俱指女子包絡而言非心包絡也特批明於此以免淆混心包絡病參看心病各條靈邪客篇諸邪之在於心者皆在於心之包絡包絡者心主之脈也手足十二經及十二經筋病第二篇足厥陰經病肝靈經脈篇肝足厥陰之脈動則病腰痛不可以俯仰丈夫㿗疝婦人少腹腫甚則嗌乾面塵脫色胸滿嘔逆飧泄狐疝遺溺閉癃筋病靈經脈篇足厥陰之筋起於大指之上結內踝前上脛結內輔下循陰股結陰器絡諸筋其病足大指支內踝前痛內輔陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收命曰秋季痹也足少陽經病膽此段於前篇膽病所録同靈經脈膽足少陽之脈動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用筋病靈經筋足少陽之筋起小指次指循脛外結膝其支者別起外輔骨走髀前者結伏兔後結於尻其直者乘季脅走腋系膺乳結缺盆上出太陽循耳後上額角交巔下結於頄支者結目眥其病小指次指轉筋引膝外不可屈伸膕筋急前引髀後引尻即上乘季脅痛引缺盆膺乳頸維筋急從左之右目不開名曰孟春痹也手少陰經病心靈經脈心手少陰之脈動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛筋病靈經筋手少陰之筋起於小指內側結鋭骨上肘內廉入腋交太陰挾乳結胸中下繫於臍其病內急心成伏梁下為肘網其病當所過者轉筋痛其成伏梁唾膿血者死經筋之病寒則反折筋急熱則筋弛不收陰痿不甩名曰季冬痹也手太陽經病小腸靈經脈小腸手太陽之脈動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛筋病靈經筋手太陽之筋起於小指之上結於腕循臂肘內鋭骨後入腋下其支者走腋後上繞肩胛循頸結於耳後又支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內鋭骨後廉痛腋下痛繞肩胛引頸痛應耳中鳴痛引頷目瞑頸筋急則為筋痿頸腫名曰仲夏痹也足太陰經病脾靈經脈脾足太陰之脈動則病舌本強食則嘔胃脘痛腹脹善噫身體皆重節心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用筋病靈經筋足太陰之筋起於大指內側結內踝其直者絡膝內輔骨循陰股結於髀聚於陰器上腹結於肋散於胸其內著脊其病足大指支內踝痛轉筋膝內輔骨痛陰股引髀痛陰器紐痛引臍兩脅痛膺中脊內痛命曰孟秋痹也足陽明經病胃靈經脈胃足陽明之脈動則病灑灑振寒善呻數缺顏黑病至則惡人與火聞水聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是謂骭足脛厥狂瘧濕淫汗出鼽衄口喎唇疹頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用經病靈經筋足陽明之筋起於中三指結於跗上膝外廉循脅屬脊其直者循骭結於缺盆其支者結外輔骨合足少陽直者循伏兔結髀聚於陰器上腹布至缺盆上頸挾口合於頄結於鼻上合太陽太陽為目上網陽明為目下網其支者從頰結耳前其病足中指支脛轉筋腳跳且堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等謂不拘高下而人於上以守等之以膏尉急頰且飲美酒啖以美食為之三指三拊也而已手太陰經病肺靈經脈肺手太陰之脈動則病肺脹滿膨膨而喘咳缺盆中痛節氣盛有餘則肩臂痛氣虛則肩背痛寒少氣不足以息筋病靈經筋手太陰之筋起於大指之上結魚後行寸口外側上臂結肘中上臑內廉入腋下出缺盆結肩前髃下結胸裡散貫賁賁門也下抵季脅其病當所過者支痛轉筋甚成息賁脅急吐血名曰仲冬痹也手陽明經病大腸靈經脈大腸手陽明之脈動則病齒痛頸腫節目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用筋病靈經筋手陽明之筋起於大指次指之端結腕上循臂上結肘外上臑結於髃其支者繞肩挾脊直者從肩髃上頸又支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視名曰孟夏痹也足少陰經病腎靈經脈腎足少陰之脈動則病飢不欲食面如漆柴咳唾則有血喝喝而喘目𥉂𥉂如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥口熱舌乾咽腫上氣嗌乾及痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛筋病靈經筋足少陰之筋起於小指之下並足太陰筋斜走內踝之下結於踵與太陽筋合並足太陰之筋上行陰股結陰器循脊內挾膂上頂結於枕骨又與太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙在外者不能俯在內者不能仰此筋折紐甚者死名曰仲秋痹也足太陽經病膀胱靈經脈膀胱足太陽之脈動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥節痔瘧頭囟項痛目黃淚出鼽衄腰腳痛小指不用筋病靈經筋足太陽之筋起小指循足外側上膕其別者於踹外上膕結於臀挾脊上項其支者別入舌本其直者上頭下結於鼻又其支者為目上網結於頄又支者從腋後結肩又支者入腋下上出缺盆又支者出缺盆斜上出頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖名曰仲春痹也手少陽三焦經病靈經脈三焦手少陽之脈動則病耳聾嗌腫喉痹是主氣所生病者汗出目鋭眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用筋病靈經筋手少陽之筋起於小指次指之端結於腕循臂肘繞臑外廉上肩走頸合手太陽其支者當頰入舌本又支者上牙循耳前屬目外眥其病當所過者即轉筋舌卷名曰季夏痹也手厥陰心包絡經病靈經脈心主手厥陰心包絡之脈動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中淡淡大動面赤目黃喜笑不休筋病靈經筋手心主之筋起於中指與太陰之筋並行結肘內廉上臂結腋下散前後挾脅其支者入腋散胸中結於臂其病當所過者轉筋胸痛息賁名曰孟冬痹也奇經八脈病第三篇八脈總論李瀕湖曰奇經凡八脈陰維陽維陰蹺陽蹺沖任督帶是也不拘制於十二正經無表裡配合故謂之奇蓋正經猶夫溝渠奇經猶夫湖澤正經之脈隆盛則溢於奇經故秦越人比之天雨下降溝渠滿溢霧霈妄行流於湖澤此發靈素未發之旨也陽維起於諸陽之會由外踝上行於衛分陰維起於諸陰之交由內踝上行於營分所以為一身之網維也陽蹺起於跟中循外踝上行於身之左右陰蹺亦起跟中循內踝上行於身之左右所以使機關蹺捷也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈亦起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表而陰維主裡以乾坤言也陽蹺主一身左右之陽而陰蹺主左右之陰以東西言也督主身後之陽而任主前之陰以南北言也帶脈橫束諸脈以六合言也二維脈病沈氏曰人身陽脈統於督陰脈統於任而諸陽諸陰之散見於各處者又必有以維繫而主持之故有陽維以維諸陽陰維以維諸陰要其所以能維者必從陰陽根柢之處以發其氣氣盛而後能維之嘗考陽維從少陰斜至足太陽發足太陽之金門而與手足少陽陽明會於陽白是其所從起者少陰而所會者皆陽也所會皆陽則所維自皆陽矣陰維則從少陽斜至厥陰發足少陰之築賓穴上至項前而終是其所起者少陽而所發所至者皆陰也所發所至皆陰則所維自皆陰矣然陽維既為諸陽之維而反起於少陰陰維既為諸陰之維而反起於少陽者何也少陰為諸陰根柢之氣而陰為陽之根故維於陽者必起於此少陽為諸陽根柢之氣而陽為陰之根故維於陰者必起於此所謂互為其根者是也二脈又為榮衛之綱領仲景云病常自汗榮衛不相和諧宜桂枝湯反煩不解先刺風池風府卻與桂枝湯則愈此二穴乃陽維之會也所以病寒熱自汗本桂枝症服之不愈乃陽維病也故必先針陽維諸會之穴以治病根然後再服桂枝病斯愈矣其曰榮衛不和者是衛氣不與榮血和也潔古云陰維為病苦心痛者其治必在足少陰三陰交此處乃陰維所起也按仲景法太陰症則用理中少陰症用四逆厥陰症用當歸四逆吳茱萸湯參其法酌其劑可治陰維之病乃潔古所以治足少陰三陰交之意也凡屬二維病者仿此素刺腰痛篇陽維之脈令人腰痛痛上怫然腫刺陽維之脈二十九難陽維為病苦寒熱陰維為病苦心痛附注張潔古曰衛為陽主表陽維受邪為病在表故苦寒熱營為陰主裡陰維受邪為病在裡故苦心痛陰陽相維則營衛和諧矣脈經診得陽維脈浮者暫起目眩陽盛實者暫苦肩息灑灑如寒診得陰維脈沉大而實者苦胸中痛脅下支滿心痛其脈如實貫珠者男子兩脅下實腰中痛女子陰痛如有瘡狀二蹺脈病張潔古云蹺者捷急之謂也二脈起於足使人捷疾也陽蹺在肌肉之上陽脈所行通貫六府主持諸表陰蹺在肌肉之下陰脈所行通貫五藏主持諸里陰蹺為病陰急則陰厥脛直五絡不通表和里病陽蹺為病陽急則狂走目不昧表病里和陰病則熱可灸照海陽陵泉陽病則寒可針風府風池又曰在陽表者當汗之在陰里者當下之又癲癇晝發灸陽蹺夜發灸陰蹺謙按陰蹺為足少陰之別陽蹺為足太陽之別蹺脈之有陰陽區別者以此甲乙經謂男子數其陽女子數其陰又謂陽脈榮其府陰脈榮其藏亦同氣相求之義耳要而論之奇經八脈惟帶脈橫束於膂不與七脈相同其他皆起於太陽少陰二經雖或統宗衆會孔道各殊其實皆自下而上源不甚遠古人只言太衝不分督任蹺維蓋有分之而不可盡分者得其大要可也素繆刺論邪客於足陽蹺之脈令人內痛從目眥始刺外踝之下半寸靈樞目中赤痛從內眥始取之陰蹺交信穴也節風痙反折先取足太陽京骨穴也及膕中及血絡出血若中有寒邪取陰蹺交信穴及三毛上大敦穴及血絡出血甲乙經人病目閉不得視者衛氣留於陰不得行干於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也病目不得瞑者衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑也附注二蹺脈氣慓悍同於衛氣而皆上出目內眥陰出於陽而陽入於陰陰陽和合上榮而大會於目故開合皆宜若二脈有病則目自病矣經云陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥陽氣盛則瞋目陰氣盛則瞑目又曰足太陽之筋為目上網足陽明之筋為目下網寒則筋急目不合熱則筋縱目不開又曰壯者營衛不失其常故晝精而夜瞑老人血氣衰氣道澀衛氣內伐故晝不精而夜不瞑此皆謂二蹺之病也二十九難陰絡者陰蹺之絡陽絡者陽蹺之絡陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急附注王叔和曰陰蹺急當從內踝以上急外踝以上緩陽蹺急當從外踝以上急內踝以上緩衝脈病沈氏曰經曰衝脈為病氣逆而裡急又曰上衝作躁熱又曰咳唾手足厥逆氣從少腹上衝胸咽面翕然熱如醉下流陰股小便難持又曰暑月病甚則傳腎肝為痿厥四肢如火或如水心煩仲景曰寒氣客脈不通氣因鳴動應手起關元隨腹直上疝瘕遺溺脅支滿煩女子絶孕動氣在上下左右不可發汗與下合此數條觀之衝脈既為十二經之海而下為血海又與督脈為十二經之道路與任脈陽明脈會於氣街則督任固與沖通為一氣故古人不分沖任督而總名曰太衝如經云廣明之後即為太衝是也內經曰三陰之所交結於腳也踝上各一行者此腎脈之下行也名曰太衝王啓玄注曰腎脈與衝脈並下行循足行而盛大故曰太衝一說衝脈起於氣街街直而通故曰太衝又說心藏在南故前曰廣明衝脈在北故後曰太衝足少陰腎與衝脈合而盛大故曰太衝兩脈先相合為表裡也衝脈在脾之下故又曰其衝在下名曰太陰蓋太衝云者以一身之精氣上升言之不只為血海言之也然沖任督雖同起下極畢竟三脈分行故沖則獨主血海而其所以主血海者以其為先天精氣之主能上灌諸陽下滲諸陰以至足跗故其治常在血海也若陰陽和而精氣足則陽和之精升運於一身之間自然無病稍有不調必逆而上僭而其為病一曰寒逆陽不足也症見胸寒少腹痛中滿暴脹疝瘕遺溺腸支煩滿女子絶孕一曰火逆陰不足也症見咳唾躁熱上搶心眩僕四肢如火心煩恍惚癡狂此皆沖病也仲景以動氣在上下左右皆不可發汗與下者以沖氣逆則陰精虛陰精虛則陽氣亦竭故禁汗下也以是知沖治則血海治臍之上下左右皆無犯而病自愈也然其氣實起於少陰發於厥陰若三陰之開合失職則本源之真水真火兩虛其為患必犯於沖經言沖病傳肝腎而為痿厥者如三陰之患犯沖則又不止痿厥二症矣素痿論衝脈者經脈之海也又靈樞衝脈者五藏六府之海骨空論衝脈為病逆氣裡急舉痛論寒氣客衝脈沖腹起於關元隨腹直上千金方孫真人咳唾手足厥逆氣從小腹上衝胸咽其面翁然如醉因復下流陰股小便難時覆冒者寸脈沉尺脈微宜茯苓五味子湯以治其氣衝金匱寒氣客脈不通氣因鳴動應手起關元隨脈直上疝瘕遺溺脅支滿煩女子絶孕動氣在上下左右不可發汗與下任脈病沈氏曰古人以任脈為陰沉之海以其起於中極下之會陰也按其脈之所到既上中極即與足厥陰太陰少陰之脈並行循關元歷石門氣海又會足少陽衝脈於陰交歷建里再會手太陽少陽足陽明之脈於中脘以上喉嚨再會陰維之脈於天突廉泉至目下之中央承泣而終是任脈固起於真陰而陰無陽不生猶地之統於天而地氣之上升必由天氣之下降兩相濟而後能通不然固陰沍寒必至成痞閉也人身之有天癸乃天之元氣下降而為精氣以充於地則真陰生既生而漸至於充然後地氣通太衝脈由是始旺月事以時下而易於有子若無子者必其任脈虛以至沖衰血竭地氣不通故也然而真陰最難充滿非年歲既至穀氣充實天元必不堅定故天癸亦不至然則真陰之盛有不由於真陽之實者乎經曰年四十而陰氣自半言乎陽極而衰為陰所襲故曰陰半蓋此陰已為窮陰非真陰也此雖真陰衰實真陽衰也故任脈為病非陰之自病實由於陰中無陽如經云男子內結七疝女子帶下瘕聚皆原結陰之故耳經又云脈來丸丸橫於寸口者為任脈此脈已為陰氣所襲故動則苦少腹引臍下引橫骨陰中切痛又苦腹中有氣如指上搶心拘急不得俯仰則皆為無陰之症何莫非無陽之症乎所謂真陰之盛必由於真陽之實益可見矣素骨空論任脈為病男子內結七疝女子帶下瘕聚靈經脈篇任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔督脈病沈氏曰人身陰陽元氣皆起於下經曰廣明之後即為太衝太衝之地屬之少陰少陰之前乃為厥陰其部有血海嘗與太衝騰精氣而上灌滲陰陽可知元氣固起於下精氣亦起於下矣嘗按精氣之自下而上也實分三道其陽者起胞中從少陰之後行太陽夾脊之中道上巔歷百會都庭以統諸陽名曰督其陰者起中極之下胞中由前陰地道而上行陽明之表中循關元歷承漿上與督脈會以統諸陰名曰任其中央一道起胞中循血海騰精氣而上上行伏臍積於胸中為宗氣以司呼吸會於咽喉名曰沖是三脈者同起於胞中一源而三歧故古人統三者而總名之曰太衝且三者之氣與陽明胃氣同住中州亦與營俱行於十二經故三者之氣能貫於一身也而督之所以為督從可識矣古人曰督之言郵也是陽脈之都綱又曰陽脈之海下極者長強也長強乃督脈之別名下極即尾骶骨也以其循脊上項散頭故實則脊強而厥虛則頭重或暈夫脊強者五痓之總名其症卒口噤背反折而瘛瘲也觀如是則督之為病從可識矣素骨空論督脈為病脊強反折節督脈生病從少腹上衝心而痛不得前後為沖疝女子不孕癃痔遺溺咽乾風論風氣循風府督穴而上則為腦風帶脈病沈氏曰考內經衝任二脈與陽明合於宗筋會於氣街皆屬於帶脈而絡於督脈則太衝所以能上養心肺者全賴帶脈維持之力且其氣完固有以牢持於身之上下而一身之強力亦自帶脈而出蓋力出於膂膂在季脅之下即帶脈所在也故經云身半以上天氣主之身半以下地氣主之中為天樞天樞在氣交之分正指帶脈而言也故人苟上而心脾抑鬱氣不運行下而肝腎虛敗真陰不榮必致停濕為熱下注於小腸血海之間病斯作矣何以言之中樞氣交不運必病腹滿陰陽兩虛中樞弱而不能鎮定必病腰溶溶如坐水中心脾上郁肝腎下虛邪熱留連而為滯淫必病赤白帶陽不能勝不能固守於天樞陰氣得以襲之必病左右繞臍腰脊痛衝心腹邪客於太陰之絡必病腰痛引小腹控䏚季脅下空軟處不可以養息此皆帶脈所生病也是知一身上下機關全在於帶帶不能自持其氣其症皆陷下而不上矣可不知帶之為病求其源而升降補瀉之哉二十九難帶之為病腹滿腰溶溶如坐水中脈經帶脈為病左右繞臍腰脊痛沖陰股也宗氣衛氣營氣病第四篇宗衛營三氣解孫一奎曰人與天地生生不息者皆一氣之流行耳是氣也具於身中名曰宗氣又曰大氣經營晝夜無或間斷靈素載之而後人莫之言也後人知有營衛而不知營衛無宗氣曷能獨循於經隧行呼吸以應息數而溫分肉哉此宗氣者當與營衛並稱以見三焦上中下皆此氣為之統宗也靈樞五味篇曰谷始入於胃其精微者先出胃之兩焦中下焦也以溉五藏別出兩行營衛之道其大氣之搏而不行者積於胸中命曰氣海大氣即宗氣氣海即膻中又邪客篇曰五穀入胃其糟粕下焦津液中焦宗氣上焦分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉此出上焦為一隧也營氣者泌其津液注之於脈化以為血以營四末內注五藏六府以應刻數焉此出中焦為一隧也衛氣者出其悍氣之慓疾而先行四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五藏六府此出下焦為一隧也營衛生會篇黃帝曰願聞營衛之所行皆何道從來歧伯曰營出於中焦衛出於下焦衛氣篇曰其浮氣之不循經者為衛氣其精氣之行於經者為營氣講明此三氣者自秦越人而後惟馬玄臺難經正義考究極詳論宗氣則曰自夫飲食入胃其精微之氣積於胸中謂之宗氣宗氣會於上焦即八會之氣會於膻中也惟此宗氣主呼吸而行脈道論營氣則曰營氣者乃陰精之氣也即宗氣之所統猶太極之分而為陰也此氣行於晝二十五度行於夜二十五度始於手太陰五十度而復會於手太陰而行晝行夜十二經之陰陽皆歷焉所謂太陰主內者此也論衛氣則曰衛氣者陽精之氣也亦宗氣之所統猶太極之分而為陽也晝日行於陽二十五度夜行於陰二十五度始於足太陽五十度而復會於足太陽復引靈樞歲露篇曰衛氣一日一夜常大會於風府風府者足太陽督脈陽維之會所謂太陽主外者此也蓋營氣行陽行陰主晝夜言衛氣行陰行陽主陽經陰經言營氣之行於晝者陽經中有陰經行於夜者陰經中亦有陽經指衛氣故行陰行陽主晝夜言也衛氣則晝必只行於陽行三陽經夜必只行於陰是陰陽不指晝夜言也宗氣謙按宗氣者大氣之搏聚者也積於胸中出於喉嚨司呼吸以行經隧因營氣常並之而行故宗氣所行之次序與營氣運行無異詳見靈樞經脈篇素平人氣象論胃之大絡名曰虛里貫膈絡肺出左乳下其動應衣脈宗氣也盛喘數絶者則病在中結而橫有結矣絶不至曰死乳之下其動應衣宗氣泄也靈邪客篇宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉邪氣藏府病形篇宗氣上出於鼻而為臭衛氣謙按肺主氣氣為衛與營氣同出於中焦若探其源則在丹田氣海之中實先天之氣生化而出故又曰衛出下焦常考其自下而升出上焦也每天明時目張出自睛明穴上行於頭盡行手足六陽經至夜行手足六陰經不隨宗氣營氣行而獨行於皮膚分肉之間故曰衛行脈外素痹論衛者水穀之悍氣也其氣慓疾滑利不能入脈也故循皮膚之中分肉之間熏於肓膜散於胸腹逆其氣則病從其氣則愈靈衛氣篇其浮氣之不能循經者為衛氣本藏篇衛氣者所以溫分肉充皮膚肥腠理司開合者也節衛氣和則分肉解利皮膚調柔腠理致密邪客篇衛氣者晝行於陽夜行於陰常從足少陰之分間行於五藏六府衛氣行篇衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周周於五藏是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者別於目鋭眥下手太陽至手小指之間外側下足少陽注小指次指之間以上循手少陽之分側別者以上至耳前合於頷脈注足陽明以下行至跗上入五指之間其散者從耳下下手陽明入大指之間其至於足也入足心出外踝復合於目故為一周節陽盡於陰陰受氣矣其始入於陰常從手足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為一周節亦如陽行之二十五周而復合於目以上論衛氣以下論衛氣病靈衛氣失常篇衛氣之留於腹中蓄積不行苑蘊不得常所使人支脅胃中滿喘呼逆傷寒論脈浮而汗出如流珠者衛氣衰也營氣謙按心生血血為營非營氣固不能生血非穀氣充亦不能生此營氣營氣者陰精之氣也故曰營出中焦是後天清氣所化而出也清者為營清濁以剛柔言謂陰氣柔和為清陽氣剛悍為濁此皆古人之說非臆斷也喻嘉言謂營氣根於中焦陽中之陰行至上焦隨上焦之宗氣降於下焦以生陰氣是營氣本濁陰之氣以其根出於上焦之清陽故謂清者為營也此亦一解又喻解濁者為衛一句謂衛氣根於下焦陰中之微陽行至中焦升於上焦以生陽氣是衛本清陽以其根出於下焦之濁陰故謂濁者為衛也究之經言營出中焦衛出下焦二句即有清濁之別矣細審自知靈經脈篇脈為營衛氣篇經氣之行於經者為營氣邪客篇營氣者泌其津液注之於脈化以為血以榮四末內注五藏六府以應刻數焉營氣篇營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太陰出注手陽明上行注足陽明下行至跗上注大指間與太陰合上行抵脾從脾注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅其支別者循巔下項循脊入骶是督脈也絡陰器過毛入臍中上循腹裡入缺盆下注肺中復出太陰此營氣順逆之常也以上論營氣以下論營氣病傷寒論其脈沉其營氣微也營氣微者加燒針則血流不行更發熱而躁煩也營氣總論補録靈營衛生會篇穀氣入於藏府清者為營濁者為衛清者即動脈中新血濁者回血管之濁血營在脈中發血管均在血脈之裡層衛在脈外回血管在脈之外面營周不休五十而復大會陰陽相貫如環無端由心藏排出行於周身者曰發血管曰動脈行至四支之末仍回覆於全身者曰回血管亦曰靜脈其血液經肺以入心房再發出而行於發血管中循環不已現今生理學中稱為循環系統是也衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止皮肉筋骨病第五篇皮病一癍痧癮疹痤痱麻木靨痣痛癢丹毒紫白癜風白屑黑白癩皮毛脫落皮水索澤沈氏曰包涵肌肉防衛筋骨者為皮皮外最薄者為膚俗謂枯皮經言皮膚亦曰腠理津液滲泄之所曰腠文理縫會之中曰理腠理亦曰元府汗液色元從空而出其始聚於孔竅故曰元府也皮之主為肺故風寒襲人肺先受病非發於皮毛即見於經絡也其他癍痧癮疹痤痱麻木靨痣無非風濕熱毒之邪各有專法可按若論大概則不過痛癢兩端經曰諸癢為虛血不榮肌又曰諸瘡痛癢皆屬於火河間就火之微盛以分痛癢曰人近火微熱則癢熱甚則痛附近則灼而為瘡或謂痛實癢虛虛者熱之微也非指虛寒也若乃丹毒為患名目繁多大凡色赤為丹色白為瘼痛者為丹毒癢者為風丹自腹出四肢者順自四肢入腹者逆若素有病面上忽見紅點者死除瘼症屬肺虛冷風宜以酒調土朱頓服之外丹毒主方甚多不如古傳十二種單方治一切丹毒但於其中用一二味即效矣單方詳後然而皮之為病不特此也又皮肉變色赤為紫癜風白為白癜風紫由風與血搏白由風與氣搏又皮肉色變不痛癢久之遍體為白駁風此肺風流注皮間其輕者即為白屑風又烏癩亦名黑癩由惡風相觸其狀生瘡痛癢如蟲行或如桃李癮疹眼前見物如絲垂手足麻木刺之不痛宜川烏升麻防已黃柏雄礬巴豆松脂熬塗又白癩色白發熱頏痛手足縱背膂急亦由風毒宜白花蛇蠶蛾羌活防風天麻白蘚皮為末酒下綜計各症均於風熱濕毒中求之其或近寒者肺氣必大虛也至於金匱皮水為濕淫所勝津枯毛脫皮澀不潤其名曰索澤又當於利濕潤燥兩法中選用之耳小兒痘病皮肉皆病不可殫述另有專條可考焉十二種單方水苔生地生松毛蒴藿葉音朔吊濕草別録下品慎火草即景天草石草類本草經上品俗以瓦盆盛養置屋頂上能闢火浮萍硝石豆葉以上皆搗敷豆豉大黃黃芩山梔以上為末和敷素痿論肺主身之皮毛節肺葉熱焦則皮毛虛弱急薄者則生痿躄也痹論以秋遇此風寒濕三氣者為皮痹節皮痹不已復感於邪內舍於肺則煩滿而喘嘔五常政大論皮𤸷肉苛筋脈不利此謂皮肉間麻木而苛癢也三部九候論皮膚著者死此謂久病肉脫皮著於骨也靈九針篇皮者肺之合也人之陽也衛氣失常篇色起兩眉薄澤者病在皮經脈篇津液去皮節者則爪枯毛折寒熱病篇皮寒熱者不可附席毛髮焦鼻槁臘不得汗取三陽之絡以補手太陰肉病二肥瘦食㑊肉苛肉痿肉脫贅肉努肉疣目肉刺息肉肉絶沈氏曰內經云肥而澤者氣血有餘肥而不澤者氣有餘血不足瘦而無澤者氣血俱不足此言其大概也其實肥者血實而氣必虛故行動喘促耐寒而惡熱熱傷氣也瘦者氣不虛而血必虛故皮多燥澀耐熱而惡寒寒傷血也此肥瘦之所以分也至其為病重者曰食㑊多食易飢不生肌肉由胃熱消穀之故次曰肉苛即𤸷重也由營虛衛實之故次曰肉痿肌頏無力由脾經傷熱之故次曰肉脫脫者空也真元內竭穀氣外衰為不治之症瘡瘍愈後有肉凸出名贅肉亦曰努肉烏梅肉貼之手足忽生如豆狀者名疣目宜烏雞膽汁或杏仁粉塗之以去風邪又肉刺紅痛血虛襲風而成不治亦愈又鼻中息肉挺出有肺熱腦風之分其餘肉爍肉核肉癭均類瘡疽各症以及肉蛾等項另有專條茲不備述若夫耳聾舌短背腫尿血大便赤泄則為肉絶之候矣經故斷之曰六日死也靈氣穴論肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以行大氣刺腰病篇肉裡之脈令人腰痛內者分肉里者肌肉之紋理也逆調論人之肉苛者雖近衣絮猶尚苛也節逢風而如灸如火者是人當肉爍也按苛者肉不知寒熱痛癢不能舉也痿論脾熱者色黃而肉蠕動節脾氣熱則胃干而渴肌肉不仁發為肉痿節有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿肉痿者得之濕地也靈刺節真邪篇寒勝其熱則骨疼肉枯節結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疸二十四難肌肉不滑澤則肉滿按滿即脹也筋病三筋急筋緩筋攣筋痿筋惕筋傷筋結轉筋筋疝筋痹筋絶沈氏曰筋也者所以束節縛骨絆肉繃皮為一身之結紐利全體之運動者也其主在肝按人身之筋到處皆有縱橫無算而又有為諸筋之主者曰宗筋內經注謂陰毛橫骨上下之堅筋上絡胸腹下貫髖尻又經背腹上頭角者是也筋之總聚處則在於膝靈樞謂諸筋皆屬於節是也至為病則曰急曰緩曰攣曰痿曰惕曰傷曰結曰轉筋曰疝曰痹曰筋絶其名目如此靈樞謂寒則反折而急熱則弛縱而緩得效又以急為寒縮為熱弛緩為濕仲景言血虛筋急故本事以養血地黃湯治之觀急由血虛則緩者血熱可推矣若夫風熱入經是以瞀瘛即筋攣之由故攣者亦曰瘛俗乃云搐也其症往往作痛內經以筋痿屬肝熱而痹為風寒濕三氣入筋傷寒以發汗傷血為筋惕之原丹溪以轉筋屬虛熱蓋亦因血熱於內而外復感風寒之故也至霍亂轉筋又以吐瀉傷胃亡其津液宗筋失養亦有手足逆冷者亦不拘於熱邪也其他久行而筋傷氣血失節而筋結肝邪下注莖中縮痛為筋疝之症呼罵不休爪甲色青為筋絶之候九日死者又不可不知也素痿論肝主身之筋膜節肝氣熱則膽泄口苦筋膜乾則筋急而攣發為筋痿節思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫痹論以春遇此風寒濕三氣者為筋痹節筋痹不已復感於邪內舍於肝則多飲溲數夜臥易驚長刺節論病在筋筋攣節痛名曰筋痹靈衛氣失常篇目色青黃赤白黑者病在筋刺節真邪篇筋屈不能伸邪氣居其間而不反發為筋溜節虛邪搏於筋則為筋攣節脈弗榮則筋急經筋篇頸筋急則為筋瘻瘻者頸筋急或急而脊曲也骨病四骨寒骨蒸骨痿骨痛骨傷骨絶沈氏曰骨之撐架於身者猶梁柱之於屋然屋非梁柱不堅豎人非骨骼不支持經言腎主骨又言骨者髓之府是惟腎氣足然後髓滿而骨堅也骨有本顴骨也故骨大則顴大骨小顴亦小而骨之最大者為脊經言膂骨下至尾骶二十一椎長三尺脊節為椎窮脊為骶是不獨為骨之最大且居中麗正一身之骨胥於是附猶屋之正梁且為諸骨之主也而其為病約有四端一曰寒人有寒甚至骨湯火不能熱厚衣不能溫然不凍栗者經名骨痹非輕微惡寒之謂宜溫腎以壯陽一曰熱其熱從骨間蒸發按之不烙手然覺有蒸郁不可耐狀非引水所能解其板齒必乾燥即經言髓涸齒乾為骨熱病者是也宜滋陰降火其熱甚至四肢緩弱不舉則勢將成骨痿之症矣一曰痿其症見後所録內經文中由於骨熱非尋常疲弱之謂宜虎潛丸等藥一曰痛人身之痛由六氣七情者不一淺者皮內間深亦只於經藏若入里徹骨則損傷已極矣宜酌其寒熱治之此外如久立傷骨則痛痿無常齒黃骨絶則藥石不救且不出十日而死矣素長刺節論病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹痹論以冬遇此風寒濕三氣者為骨痹節骨痹不已復感於邪內舍於腎則善脹氣穴論積寒留舍榮衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁痿論腎主身之骨髓節腎氣熱則腰脊不舉骨枯而髓減發為骨痿節有所遠行勞倦逢火熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虛故足不任身發為骨痿靈衛氣失常篇耳焦枯受塵垢病在骨刺節真邪篇虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯節結深中骨氣因於骨骨與氣並日以益大則為骨疽節虛邪內搏於骨則為痛痹寒熱病篇骨寒熱者取其少陰於陰股之絡齒已槁死不治骨厥亦然按骨厥見前足少陰經病條中節骨痹舉節不用而痛汗注煩心陰陽二十五人篇感於寒濕則善痹骨痛爪枯也邪氣藏府病形篇腎氣微滑為骨痿坐不能起起則目無所見節腎脈急甚則骨癲疾此謂癲疾之由於骨者癲狂篇骨癲疾者顑齒諸腧分肉皆滿而骨居羸弱過甚而骨獨存也汗出煩悗嘔多沃沫氣下泄死不治本神篇精傷則骨痠痿厥附六淫病第六篇風寒暑濕燥火風淫沈氏曰經言諸暴強直支痛軟戾裡急筋縮皆屬於風此厥陰風木為肝膽之氣乃藏氣所主之風也若八方不正之風則為邪氣故中人即為病其有四時勝氣而襲之者如春勝長夏為木剋土長夏勝冬為土剋水以所勝入也其有隨時隨藏而為病者以內氣不守外邪得入也故春病在頭鼽衄夏在藏病胸脅長夏在脾積風為寒洞泄寒中秋在肩背暑汗不出風襲腠膚善風瘧冬在四肢脾厥考其所以然者人之精為真陰為元氣之本惟冬藏精則內實雖夏之暑邪亦汗出而不得入若冬不藏又暑汗不出閉藏疏泄之道俱失則凡春溫夏熱秋瘧及冬寒四季之淫隨時隨藏而病此風邪所化之由也然風入五藏其狀各殊肺受風多汗惡風色白咳而短氣晝減暮劇診在眉上白心則多汗惡風善恐色赤木火交熾神志昏亂舌本強其診在口肝亦多汗惡風色蒼肝本為風風反勝之則內氣不勝多悲多怒陰器病則妒陰時憎女子也故名診在目下脾亦多汗惡風色黃土為風木所克身體怠惰脾不化食診在鼻腎亦自汗惡風面浮腫脊痛炲氣見診在肌上五藏受風不同病由各異如此又風中當早治遲則五藏遞傳以至於死如初感毛直皮閉而為熱是當汗發即已即或痹而不仁亦可尉灸之惟弗治遂入舍肺自表入里閉之則為肺痹發咳喘急也又不發之從所克而傳肝為肝痹脅痛而出食也又弗治再從所克而傳脾風熱相乘為脾痹內則煩熱外則體黃又弗治再從所克而傳腎為疝瘕邪聚下焦溲出白濁且熱結蝕陰也又弗治再從所克而傳心筋脈引急病名曰瘛邪氣至此已極藏氣皆息能無死乎此五藏相傳之次也又內先有所傷而適與風邪相會而發者所謂合邪也凡邪之中人雖各有所入要歸於三部喜怒不節則傷藏病起於陰一也清濕襲虛病起於下二也風雨襲虛病起於上三也至於淫佚不可勝數然受病之始只此三部故風氣百疾不得虛邪不能獨傷人總之風善行數變傷人為病變態不一如風襲皮膚腠理開則衛泄而寒元府閉則陽壅而熱則為寒熱病矣又如風入胃中其人肥邪循脈上目內眥而黃則留為熱中其人瘦則變為寒中矣又如風客於諸脈俞散行分肉或使生瘍㿉或不仁或胕府熱或不去而為癘風矣若入五藏六府之俞隨左右而偏中則又為偏風矣以至循風府入腦為腦風飲酒後元府開而中之為漏風新沐而中為首風風不散傳入大腸為腸風在腠理汗泄不止為泄風病雖異名皆風之變也首風因沐而中頭面多汗惡風頭極痛先日甚次日少愈漏風常多汗不可單衣食則汗出身熱不惡寒甚或陽盛於上而喘息衣濡口乾時飲泄風汗出津涸口乾身痛畏寒汗多亡陽也要之風為百病之長凡寒暑濕燥火五者皆從風而入而風之為邪又有寒熱剛柔內外之不一則治之豈易事哉附風病名中風類中傷風五藏五風偏風腦風漏風內風首風腸風泄風胃風勞風勞汗當風傷腎頭風偏正毒風生瘡刺風如刀刺無定處癇風驚風頑風惡風暗風㾴風面生米點節風酒風素問身熱汗出惡風少氣膽風氣風肉內如蟲行癱風手足拳攣瘓風同上虛風脫風賊風産風骨風膝風盛風言語謇澀髓風血風皮風肌風閉風便燥軟風四肢不舉剛風虎風發吼羊叫天風成片爛瘡緑風瞳人大青風吐極青盲破傷風腎囊風乳子臍風素風論風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉六元正紀大論風病行於上節木鬱之發大風乃至民病胃脘當心而痛上支兩脅隔咽不通食飲不下甚則耳鳴眩轉善暴僵仆氣交變大論歲木太過風氣流行民病飧泄食減體重煩冤腸鳴腹支滿節歲土不及風乃大行民病飧泄霍亂腹痛陰陽應象大論風氣通於肝靈五色篇風者百病之始也壽夭剛柔篇病在陽者命曰風寒淫沈氏曰經云諸病上下所出水液澄徹清冷癥瘕禿疝堅痞腹滿急痛下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒夫腎為水藏膀胱亦屬寒水腎陽若虛則寒水之氣益泛而諸寒病生焉是寒之為病無論外召內生未有不由於陽虛者也至其重且險者莫如傷寒宜遵仲景之法茲不贅論又有中寒一症身直口噤戰掉眩暈身無汗者為寒毒所中脈必沉細緊澀或陰陽俱盛有汗反不治若肢冷腹絞痛唇青者宜半夏皂角麝香填臍艾灸又或乘冷食冷致頭痛身熱項急腹痛嘔吐者為雜中寒五積散溫之可也其他寒邪久伏所發之病或為痼冷或為厥逆或為積聚癥瘕痃癖痞氣寒疝等症又當於各門中求之素至真要大論寒氣大來水之勝也火熱受邪心病生焉六元正紀大論水鬱之發陽氣乃闢陰氣暴舉大寒乃至民病寒客心痛腰椎痛大關節不利屈伸不便善厥逆痞堅腹滿氣交變大論歲水太過寒氣流行邪害心火節歲火不及寒乃大行暑淫沈氏曰夏月相火行令人感其氣自口鼻而入於肺胃多見身熱汗出而喘煩渴多言倦怠少氣或下血發黃生斑等症如入心包散於血脈而入腦則四肢搐搦不省人事法宜分上中下治之以去濕熱清心肺利小便為主氣虛受傷者宜稍補之若見惡寒肢逆甚至迷悶不省霍亂吐瀉痰滯厄逆腹滿泄利者此非僅傷於暑乃兼暑中之濕也內經以脈虛身熱為傷暑金匱以弦細芤遲為傷暑蓋以暑傷氣而不傷形故氣消而脈虛弱或芤遲也大抵肺胃症之熱甚者宜白虎湯以養陰而制熱其輕者竹葉石膏湯氣虛則加人參其最輕而兼水氣者天水散水停心下者瓜蒂吐之其有乘涼飲冷湯陽氣為陰邪郁遏者則香薷扁豆六和湯宜之寒多者大順散或冷香飲子寒熱交併而氣復虛者則以清暑益氣湯補之熱邪閉竅者牛黃至寶蘇合香丸等開之凡此為氣分用藥之大概若傷及陰分入心則犀角黃連瀉心等藥剋金則清燥救肺併入酸甘之味如生脈湯法入中焦而爍津液則五汁玉女涼膈桃仁承氣等藥隨證選投至下焦則用連梅復脈三才來復等方視其肝腎受邪及虛實如何也此又血分用藥之大概也各條症狀另有專書可考茲不詳言霍亂亦然其治法除探吐急刺外藿香正氣桂苓甘露及胃苓湯漿水散救中湯皆可採用無非取其通陽也伏暑治法又與暑症無殊也素六元正紀大論在天為熱在地為火其性為暑生氣通天論因於暑汗煩則喘喝靜則多言氣交變大論歲火太過炎暑流行金肺受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱節歲金不及炎火乃行至真要大論少陰司天為熱化金匱真言論夏暑汗不出者秋成風瘧舉痛論炅則氣泄濕淫沈氏曰經云諸濕腫滿皆屬脾土又曰諸痙強直積飲痞膈中滿吐下霍亂體重胕腫肉如泥按之不起皆屬於濕蓋太陰濕土乃己土之氣過濕兼有內外兩因也其內因者本脾土所化之濕火盛化為濕熱水盛化為寒濕其狀發熱惡寒身重自汗筋骨疼小便祕大便溏腰疼胕腫肉如泥腳如石墜其脈必緩浮緩在表沉緩在裡弦緩風濕治法以燥脾利溲為主其外因者為天雨露地泥水人飲食生冷與汗衣寢濕其症首如裹骨節疼手足軟腿胕腫挾風痰則麻兼死血則木有邪火則腫痛或疝氣偏墜目黃其脈亦緩治法亦以燥濕利便為主且凡濕在上者宜開肺利氣在中宜運脾燥土在下宜利便以開溝渠又古法治水腫腰以上發汗以下利便者亦同此意至濕遍周身宜烏藥羌活在兩臂宜桑條威靈仙濕在兩股宜牛膝防已萆薢等藥分其部位而治之則一身之患有不盡去者乎又同一濕也而有中濕寒濕風濕濕痹濕熱溫濕酒濕及濕痰之不同焉中濕者脈沉腹脹流於關節則肢痛身重久更浮腫喘滿挾風眩噦挾寒攣疼此顯而可驗者也寒濕雖夏月亦覺清冷多中於氣血兩虛之人發為關節掣痛溏泄或痛冷痛而成腎著前人以尿赤而渴為濕熱尿清不渴為寒濕是其驗也風濕者太陽經感風與濕其骨節痠疼汗出身寒小便不利或有微腫脈沉短氣雖惡風寒宜微汗之但不得用麻葛令其大汗若大汗則風去濕留反能為患濕熱者濕鬱成熱口必渴其體痛必流走無定處或狀熱而脈浮稍數耳濕痰者痰流所到為痛溫濕者多因暑濕相搏其脈陽濡而陰小急必有三焦見症舌苔黃滑不可發汗余法繁重宜閲專條不能盡述酒濕亦能作痹甚則口喎身似中風當泄濕毒不可作風治而發其汗濕痹詳列本條非僅太陽關節疼痛一症而凡三氣雜至為痹者均宜參考之耳至其傷濕之故則有由肺氣不化與膀胱氣不化者有由中焦不運下焦虛冷者外症則坐臥濕地當風飲冷及風濕相搏所成且霧露雨濕上先受之地氣寒濕下先受之口竅所吸之水與汗及痰涎內壅者則肌肉脾胃實當之症異治殊辨之宜確素陰陽應象大論中央生濕節濕勝則濡泄六元正紀大論太陰所至為濕生節諸濕腫滿皆屬於脾節土鬱之發洪水乃從善為時雨民病心腹脹腸鳴嘔吐霍亂飲發注下胕腫身重至真要大論濕氣大來土之勝也寒水受邪腎病生焉太陰陽明篇陽受風氣陰受濕氣節傷於濕者下先受之氣交變大論歲土太過雨濕流行腎水受邪民病腹痛清厥體重煩冤節歲水不及濕乃大行民病腹滿濡泄寒瘍流水腰股痛發足跗浮腫燥淫沈目南燥病論曰天元紀大論雲天以六為節地以五為制蓋六乃風寒暑濕燥火為節五即木火土金水為制然天氣主外而一氣司六十日有奇地運主內而一運主七十二日有奇故五運六氣合行而終一歲乃天然不易之道也內經失去長夏傷於濕秋傷於燥所以燥證淹沒至今不明先哲雖有言之皆是內傷津血乾枯之證非謂外感清涼時氣之燥然燥病起於秋分以後小雪以前陽明燥金涼氣司令經云陽明之勝清發干中左胠脅痛溏泄內為嗌塞外發㿗疝大涼蕭殺華英改容毛蟲乃殃胸中不便嗌塞而咳據此經文燥令必有涼氣感人肝木受邪而為燥也惟近代喻嘉言昂然表出可為後世蒼生之幸奈以諸氣膹郁諸痿喘嘔咳不止而出白血死謂之燥病此乃傷於內而言誠與外感燥證不相及也更自制清燥救肺湯皆以滋陰清涼之品施於火熱刑金肺氣受熱者宜之若治燥病則以涼投涼必反增病劇殊不知燥病屬涼謂之次寒病與感寒同類經以寒淫所勝治以甘熱此但燥淫所勝平以苦溫乃外用苦溫辛溫解表與冬月寒令而用麻桂薑附其法不同其和中攻裡則一故不立方蓋內經六氣但分陰陽主治以風熱火三氣屬陽同治但藥有辛涼苦寒鹹寒之異濕燥寒三氣屬陰同治但藥有苦熱苦溫甘熱之不同仲景所以立傷寒溫病二論為大綱也蓋性理大全謂燥屬次寒奈後賢悉謂屬熱大相徑庭如盛夏暑熱熏蒸則人身汗出濈濈肌肉潮潤而不燥也冬月寒凝肅殺而人身乾稿燥洌故深秋燥令氣行人體肺金應之肌膚亦燥乃火令無權故燥屬涼前人謂熱非矣素陰陽應象大論西方生燥五常政大論燥勝則乾至真要大論清氣大來燥之勝也風木受邪肝病生焉氣交變大論歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛節歲木不及燥乃大行六元正紀大論金鬱之發大涼乃舉燥氣以行民病咳逆心脅滿引少腹善暴痛不可反側嗌乾面陳色惡火淫繆仲淳曰夫火者陽也氣也與水為對待者也水為陰精火為陽氣二物匹配名曰陰陽和平亦名少火生氣如是則諸病不生矣倘不善攝養以致陰虧水涸則火偏勝是謂陽盛陰虛亦曰壯火食氣是知火即熱氣之最甚者也東垣曰火與元氣不兩立亦指此也蓋平則水火既濟火即真陽之氣及其偏則陽氣為火也始與元氣不兩立矣故戴人曰莫治風莫治燥治得火時風便了正指火之變態多端為病不一了此則皆可辨也沈氏曰火主動凡動極者多屬火醉飽胃火動恚怒肝火動悲哀肺火動房勞腎火動心火能自焚是五藏皆有火也且火動即身熱其因於五藏者各不同如按至肌肉之下至骨上乃肝之熱寅卯時尤甚如按至皮膚之下肌肉之上輕手乃得少加力按之則全不熱是熱在血脈也乃心之熱日中尤甚如輕按重按皆不熱而在不輕不重之間此熱在肌肉也乃脾之熱夜尤甚如輕按不熱重按至骨其熱灸手乃腎之熱亥子時尤甚如按至皮毛之上輕手即得重按全無此熱在皮毛也乃肺之熱日西尤甚均宜分輕重虛實治之且火動則熱壅其見於三焦者又各不同如熱在上焦因咳而為肺痿或口舌生瘡眼目赤腫熱在中焦便堅結或胸膈煩躁飲食不美或吐血烙血如熱在下焦尿血淋閉或小便赤澀大便祕結是三焦之熱又當分別也如感外熱而成瘟疫者則以清潤生津兼化穢濁為主不宜過於涼泄總之火分虛實如遇發熱脈沉實而大者為實脈浮數而虛者為虛實者攻之虛者補之不可一概投涼重傷脾胃化而裁之因乎變神而明之存乎人素陰陽應象大論南方生熱熱生火至真要大論熱氣大來火之勝也金燥受邪肺病生焉節諸熱瘛瞀諸禁鼓栗如喪神守諸逆衝上諸躁狂越皆屬於火節少陽司天為火化氣交變大論歲火太過炎暑流行金肺受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱節歲金不及炎火乃行六元正紀大論火鬱之發炎火行大暑至民病少氣瘡瘍癰腫節腹中暴痛血溢流注精液乃少目赤心熱甚則瞀悶懊憹善暴死
